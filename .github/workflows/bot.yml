name: Repost VK to TG

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  repost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Скачиваем артефакт, если он есть
      - name: Download last_post_id
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: last-post-id
          path: .

      # Если артефакта нет — создаём пустой файл
      - name: Create empty file if not exists
        run: |
          if [ ! -f last_post_id.txt ]; then
            echo "0" > last_post_id.txt
            echo "Создан новый файл last_post_id.txt с ID 0"
          else
            echo "Файл last_post_id.txt уже существует"
          fi

      - name: Run the reposter
        run: python main.py
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      # Загружаем артефакт для следующего запуска
      - name: Upload last_post_id
        uses: actions/upload-artifact@v4
        with:
          name: last-post-id
          path: last_post_id.txt
          retention-days: 1
