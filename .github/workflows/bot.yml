name: Repost VK to TG

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  repost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Шаг загрузки артефакта с явной проверкой существования
      - name: Download last_post_id (if exists)
        id: download-artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: last-post-id
          path: .

      # Если файла нет, создаем пустой, чтобы избежать ошибки в основном скрипте
      - name: Create empty last_post_id.txt if not exists
        run: |
          if [ ! -f last_post_id.txt ]; then
            echo "Файл last_post_id.txt не найден, создаем пустой"
            touch last_post_id.txt
          fi

      - name: Run the reposter
        run: python main.py
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Upload last_post_id
        uses: actions/upload-artifact@v4
        with:
          name: last-post-id
          path: last_post_id.txt
